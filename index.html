<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> Biodata</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins','Noto Sans Devanagari',sans-serif;
background:linear-gradient(135deg,#6b0000,#b8860b,#6b0000);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
max-width:1000px;
width:100%;
background:white;
border-radius:15px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
padding:30px;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

/* Header */

.hindu-header{
text-align:center;
border-bottom:3px solid #b8860b;
padding-bottom:15px;
margin-bottom:20px;
}

.hindu-header h1{
color:#8B0000;
font-size:32px;
}

.hindu-header h2{
color:#b8860b;
font-size:22px;
}

/* Profile */

.profile{
text-align:center;
margin:20px 0;
}

.profile img{
width:160px;
height:160px;
border-radius:50%;
border:6px solid #b8860b;
object-fit:cover;
}

/* Language Buttons */

.lang-btn{
margin-top:15px;
}

.lang-btn button{

padding:10px 18px;
margin:5px;
border:none;
border-radius:8px;
background:#8B0000;
color:white;
font-size:14px;
cursor:pointer;
transition:.3s;
}

.lang-btn button:hover{
background:#b8860b;
}

/* Grid */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.card{
background:#fff8e7;
padding:20px;
border-radius:12px;
border-left:6px solid #b8860b;
}

.card h3{
color:#8B0000;
margin-bottom:10px;
}

.info{
margin:6px 0;
font-size:15px;
}

.footer{
text-align:center;
margin-top:25px;
color:#666;
}

/* Responsive */

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.profile img{
width:130px;
height:130px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="hindu-header">

<h1 id="ganesh">॥ श्री गणेशाय नमः ॥</h1>
<h2 id="title">Biodata </h2>

</div>

<div class="profile">

<div class="lang-btn">

</div>

<div class="grid">

<div class="card">

<h3 id="personalTitle">👤 व्यक्तिगत जानकारी</h3>

<p class="info" id="height"></p>
<p class="info" id="birth"></p>
<p class="info" id="caste"></p>
<p class="info" id="religion"></p>
<p class="info" id="marital"></p>

</div>

<div class="card">

<p class="info" id="education"></p>
<p class="info" id="college"></p>
<p class="info" id="job"></p>
<p class="info" id="company"></p>

</div>

<div class="card">

<h3 id="familyTitle">👪 पारिवारिक जानकारी</h3>

<p class="info" id="father"></p>
<p class="info" id="mother"></p>
<p class="info" id="brother"></p>

</div>

<div class="card">

<h3 id="contactTitle">📞 संपर्क जानकारी</h3>

<p class="info" id="mobile"></p>
<p class="info" id="email"></p>
<p class="info" id="address"></p>

</div>

</div>

<div class="footer" id="footer">
🌸 शुभ विवाह हेतु बायोडाटा 🌸
</div>

</div>

</html>
